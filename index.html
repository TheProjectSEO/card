<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Aman - SEO Consultant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            padding: 48px 32px;
            text-align: center;
        }

        .name {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .title {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }

        .details {
            list-style: none;
            margin-bottom: 36px;
        }

        .details li {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .details li:last-child {
            border-bottom: none;
        }

        .details a {
            color: #1a1a1a;
            text-decoration: none;
        }

        .details a:hover {
            text-decoration: underline;
        }

        .details .label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #999;
            margin-bottom: 2px;
        }

        .qr-section {
            margin-bottom: 24px;
        }

        .qr-section p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #999;
            margin-bottom: 12px;
        }

        #qrcode {
            display: inline-block;
        }

        #qrcode canvas {
            border-radius: 4px;
        }

        .save-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="name">Aditya Aman</h1>
        <p class="title">Founder, TheProjectSEO</p>

        <ul class="details">
            <li>
                <span class="label">Email</span>
                <a href="mailto:aditya@theprojectseo.com">aditya@theprojectseo.com</a>
            </li>
            <li>
                <span class="label">Phone</span>
                <a href="tel:+639603022233">+63 960 302 2233</a>
            </li>
            <li>
                <span class="label">LinkedIn</span>
                <a href="https://linkedin.com/in/adityaaman" target="_blank">linkedin.com/in/adityaaman</a>
            </li>
            <li>
                <span class="label">Web</span>
                <a href="https://theprojectseo.com" target="_blank">theprojectseo.com</a>
            </li>
        </ul>

        <div class="qr-section">
            <p>Scan to save contact</p>
            <div id="qrcode"></div>
        </div>

        <a class="save-btn" href="#" id="saveContact">Save Contact</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        const vcard = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            'N:Aman;Aditya;;;',
            'FN:Aditya Aman',
            'ORG:TheProjectSEO',
            'TITLE:Founder',
            'TEL;TYPE=CELL:+639603022233',
            'EMAIL:aditya@theprojectseo.com',
            'URL:https://theprojectseo.com',
            'URL:https://linkedin.com/in/adityaaman',
            'END:VCARD'
        ].join('\n');

        new QRCode(document.getElementById('qrcode'), {
            text: vcard,
            width: 180,
            height: 180,
            colorDark: '#1a1a1a',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });

        document.getElementById('saveContact').addEventListener('click', function(e) {
            e.preventDefault();
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Aditya_Aman.vcf';
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
